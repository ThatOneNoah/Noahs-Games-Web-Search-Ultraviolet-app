<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Smash Flash 2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    
    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            
            // Make it take up the whole screen
            player.style.width = "100%";
            player.style.height = "100%";
            
            document.getElementById("game-container").appendChild(player);
            
            // Load your specific link
            player.load("https://cdn.jsdelivr.net/gh/usjehxhjw5252/gem-desktop@211bc07ee212a680caeb965743f64bcc190f07ac/bin/ed.js");
        });
    </script>
</body>
</html>
