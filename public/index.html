        .sidebar { width: 260px; background: var(--card-bg); padding: 20px; display: flex; flex-direction: column; border-right: 2px solid var(--primary); z-index: 10; }
        .logo { font-size: 24px; color: var(--accent); text-shadow: 0 0 10px var(--accent); margin-bottom: 40px; text-align: center; cursor: pointer; }
        .nav-btn { background: none; border: none; color: #888; font-family: var(--font-main); font-size: 16px; padding: 15px; text-align: left; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-btn:hover, .nav-btn.active { color: var(--text); background: rgba(108, 92, 231, 0.2); border-left: 4px solid var(--primary); }

        .filter-bar { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; align-items: center; }
        #game-search { flex: 1; min-width: 250px; background: #000; border: 1px solid var(--primary); color: white; padding: 12px 20px; font-family: var(--font-main); border-radius: 5px; }
        .category-chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .chip { padding: 8px 15px; background: #1e1e24; border: 1px solid var(--primary); border-radius: 20px; cursor: pointer; font-size: 10px; white-space: nowrap; transition: 0.3s; }
        .chip.active { background: var(--primary); color: white; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .game-card { background: var(--card-bg); border: 1px solid #333; border-radius: 8px; overflow: hidden; transition: 0.3s; position: relative; cursor: pointer; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 206, 201, 0.4); }
        .card-thumb { height: 140px; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .game-card:hover .card-thumb img { transform: scale(1.1); }
        .card-info { padding: 15px; }
        .card-title { font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fav-btn { position: absolute; top: 10px; right: 10px; color: #ffffff99; z-index: 5; cursor: pointer; font-size: 20px; text-shadow: 0 0 5px black; }
        .fav-btn.active { color: #fdcb6e; text-shadow: 0 0 10px #fdcb6e; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }
        .login-box { background: var(--card-bg); border: 2px solid var(--primary); padding: 40px; width: 400px; text-align: center; box-shadow: 0 0 20px var(--primary); animation: popIn 0.3s ease; }
        .login-input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; font-family: var(--font-main); }
        .btn { width: 100%; padding: 15px; background: var(--primary); border: none; color: white; font-family: var(--font-main); cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: #5649c0; transform: scale(1.02); }
        .btn-google { background: #db4437; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-guest { background: transparent; border: 1px solid #333; color: #888; font-size: 10px; margin-top: 15px; }
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .profile-avatar { width: 100px; height: 100px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid var(--accent); overflow: hidden; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-stats { display: flex; gap: 20px; margin-top: 10px; font-size: 12px; color: #888; }
        .bio-box { background: #000; padding: 10px; border: 1px solid #333; margin-top: 10px; font-size: 12px; min-height: 60px; width: 100%; color: white; font-family: sans-serif; resize: none; }

        #game-frame { width: 100%; height: 100%; border: none; background: #000; }

        .fps-counter { color: #00cec9; font-size: 12px; border: 1px solid #00cec9; padding: 5px 10px; }

    <div id="login-modal" class="modal-overlay">

    </div>

            </form>
            <iframe id="uv-frame" style="flex: 1; border: 2px solid var(--primary); border-radius: 8px; background: white;" src=""></iframe>
        </div>

        <div id="profile-view" class="hidden">
            <div class="profile-header">

                <div style="flex:1">

                    <div class="profile-stats">

                    </div>

                    <button class="btn" style="width: auto; padding: 5px 15px; font-size: 12px;" onclick="saveProfile()">Save Profile</button>
                </div>
            </div>
            
            <h3 style="color:var(--accent); margin-bottom:15px;">ADD FRIENDS (By Email)</h3>
            <div style="display:flex; gap:10px; margin-bottom:30px;">

                <button class="btn" style="width:auto; margin:0;" onclick="addFriend()">Add</button>
            </div>

            <h3 style="color:var(--accent); margin-bottom:15px;">FRIENDS LIST</h3>
            <div id="friend-list" style="margin-bottom:30px; color:#888;">No friends added yet.</div>
        </div>
    </div>

            <div id="active-game-title">GAME TITLE</div>
            <div style="display: flex; gap: 10px; align-items: center;">

            </div>
        </div>
        <iframe id="game-frame" src="" allow="autoplay; fullscreen; gamepad; accelerometer; gyroscope; payment; midi; vr; xr-spatial-tracking"></iframe>

            { title: "Yume Nikki", file: "Yume Nikki.html", category: "Horror", thumb: "game images/YUME NIKKI.png" },

            { title: "ULTRAKILL", file: "ULTRAKILL.html", category: "Action", thumb: "game images/ULTRAKILL.png" }
        ];

        let currentUser = null;
        let favorites = [];
        let currentSection = 'library';
        let selectedCategory = 'All';

        // --- EXISTING FIREBASE LOGIC ---
        async function fireAuth(action) {
            if(!window.fire) { alert("Firebase Loading..."); return; }
            const { auth, db, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, doc, setDoc, getDoc } = window.fire;
            try {
                const email = document.getElementById('email-input').value;
                const pass = document.getElementById('pass-input').value;
                let userCred;
                if (action === 'login') userCred = await signInWithEmailAndPassword(auth, email, pass);
                else if (action === 'signup') {
                    userCred = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "users", userCred.user.uid), { username: email.split('@')[0], bio: "New Player", friends: [], favorites: [] });
                } else if (action === 'google') {
                    userCred = await signInWithPopup(auth, new GoogleAuthProvider());
                    const snap = await getDoc(doc(db, "users", userCred.user.uid));
                    if (!snap.exists()) await setDoc(doc(db, "users", userCred.user.uid), { username: userCred.user.displayName, bio: "Google Player", friends: [], favorites: [] });
                } else if (action === 'logout') { await signOut(auth); location.reload(); return; }
            } catch (error) { alert("Auth Error: " + error.message); }
        }

        window.onload = () => {
            const checkFire = setInterval(() => {
                if (window.fire && window.fire.onAuthStateChanged) {
                    clearInterval(checkFire);
                    window.fire.onAuthStateChanged(window.fire.auth, async (user) => {
                        if (user) {
                            currentUser = user;
                            document.getElementById('login-modal').classList.add('hidden');
                            document.getElementById('status-dot').style.color = "#00ff00";
                            document.getElementById('logout-btn').classList.remove('hidden');
                            const snap = await window.fire.getDoc(window.fire.doc(window.fire.db, "users", user.uid));
                            if(snap.exists()) {
                                const d = snap.data();
                                document.getElementById('username-span').innerText = d.username;
                                if(d.favorites) favorites = d.favorites;
                                if(user.photoURL) document.getElementById('p-avatar-box').innerHTML = `<img src="${user.photoURL}">`;
                            }
                        } else if(!localStorage.getItem('guestMode')) document.getElementById('login-modal').classList.remove('hidden');
                        renderGames();
                    });
                }
            }, 500);
            if(localStorage.getItem('guestMode')) enableGuestMode();
            startFPSCounter();
        };

        function enableGuestMode() {
            localStorage.setItem('guestMode', 'true');
            document.getElementById('login-modal').classList.add('hidden');
            favorites = JSON.parse(localStorage.getItem('localFavs') || "[]");
            renderGames();
        }

        // --- UPDATED NAVIGATION LOGIC ---
        function showSection(section) {
            currentSection = section;
            // Hide all views
            document.getElementById('library-view').classList.add('hidden');
            document.getElementById('profile-view').classList.add('hidden');
            document.getElementById('search-view').classList.add('hidden');
            
            // Remove active state from sidebar buttons
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            // Show the correct view based on the selection
            if(section === 'library') {
                document.getElementById('library-view').classList.remove('hidden');
                document.getElementById('lib-btn').classList.add('active');
                document.getElementById('section-title').innerText = "ALL GAMES";
                renderGames();
            } else if (section === 'favorites') {
                document.getElementById('library-view').classList.remove('hidden');
                document.getElementById('fav-btn').classList.add('active');
                document.getElementById('section-title').innerText = "FAVORITES";
                renderGames();
            } else if (section === 'search') {
                document.getElementById('search-view').classList.remove('hidden');
                document.getElementById('search-btn').classList.add('active');
            } else if (section === 'profile') {
                document.getElementById('profile-view').classList.remove('hidden');
                document.getElementById('profile-btn').classList.add('active');
                loadProfileStats();
            }
        }

        // --- NEW ULTRAVIOLET LOGIC ---
        // 1. Register UV Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // UV relies on a backend bare server and a service worker to intercept traffic
                navigator.serviceWorker.register('/uv/sw.js', {
                    scope: __uv$config.prefix
                });
            });
        }

        // 2. Handle Search Submissions
        const uvForm = document.getElementById('uv-form');
        const uvInput = document.getElementById('uv-address');
        const uvFrame = document.getElementById('uv-frame');

        uvForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            let url = uvInput.value.trim();
            if (!url) return;

            // Check if it's a regular search query or an exact URL
            if (!/^http(s?):\/\//.test(url) && !url.includes('.')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            // Encode the URL through UV and set the iframe
            uvFrame.src = __uv$config.prefix + __uv$config.encodeUrl(url);
        });

        // --- REMAINDER OF YOUR EXISTING LOGIC ---
        function filterCategory(cat) {
            selectedCategory = cat;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            renderGames();
        }

        document.getElementById('game-search').addEventListener('input', renderGames);

        function renderGames() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            const query = document.getElementById('game-search').value.toLowerCase();
            const showFavs = currentSection === 'favorites';

            games.forEach(game => {
                if (showFavs && !favorites.includes(game.title)) return;
                if (selectedCategory !== 'All' && game.category !== selectedCategory) return;
                if (!game.title.toLowerCase().includes(query)) return;

                const card = document.createElement('div');
                card.className = "game-card";
                const isFav = favorites.includes(game.title);
                card.innerHTML = `
                    <div class="fav-btn ${isFav ? 'active' : ''}"><i class="${isFav ? 'fas' : 'far'} fa-star"></i></div>
                    <div class="card-thumb"><img src="${game.thumb}" onerror="this.src='https://placehold.co/250x140?text=GAME'"></div>
                    <div class="card-info"><div class="card-title">${game.title}</div><div style="font-size: 10px; color: var(--primary);">${game.category.toUpperCase()}</div></div>
                `;
                
                card.addEventListener('click', (e) => {
                    if(!e.target.closest('.fav-btn')) launchGame(game.file, game.title);
                });
                card.querySelector('.fav-btn').addEventListener('click', (e) => toggleFav(e, game.title));
                grid.appendChild(card);
            });
        }

        async function toggleFav(e, title) {
            e.stopPropagation();
            if (favorites.includes(title)) favorites = favorites.filter(t => t !== title);
            else favorites.push(title);
            if (currentUser) await window.fire.updateDoc(window.fire.doc(window.fire.db, "users", currentUser.uid), { favorites: favorites });
            else localStorage.setItem('localFavs', JSON.stringify(favorites));
            renderGames();
        }

        async function saveProfile() {
            if(!currentUser) return alert("Please Login.");
            await window.fire.updateDoc(window.fire.doc(window.fire.db, "users", currentUser.uid), { bio: document.getElementById('p-bio').value });
            alert("Profile Saved!");
        }

        async function addFriend() {
            if(!currentUser) return;
            await window.fire.updateDoc(window.fire.doc(window.fire.db, "users", currentUser.uid), { friends: window.fire.arrayUnion(document.getElementById('friend-input').value) });
            showSection('profile');
        }

        async function loadProfileStats() {
            if(!currentUser) return document.getElementById('p-username').innerText = "Guest Mode";
            const snap = await window.fire.getDoc(window.fire.doc(window.fire.db, "users", currentUser.uid));
            if(snap.exists()) {
                const d = snap.data();
                document.getElementById('p-username').innerText = d.username;
                document.getElementById('p-bio').value = d.bio || "";
                document.getElementById('p-friends-count').innerText = `${d.friends ? d.friends.length : 0} Friends`;
                document.getElementById('p-fav-count').innerText = `${d.favorites ? d.favorites.length : 0} Favorites`;
                const fList = document.getElementById('friend-list');
                fList.innerHTML = d.friends && d.friends.length > 0 ? d.friends.map(f => `<div class="friend-card"><span>${f}</span> <i class="fas fa-comment"></i></div>`).join('') : "No friends added yet.";
            }
        }

        function launchGame(file, title) {
            document.getElementById('active-game-title').innerText = title;
            document.getElementById('game-layer').classList.remove('hidden');
            document.getElementById('intro-screen').classList.remove('hidden');
            setTimeout(() => document.getElementById('intro-screen').classList.add('hidden'), 2000);
            document.getElementById('game-frame').src = file;
        }

        function closeGame() {
            document.getElementById('game-layer').classList.add('hidden');
            document.getElementById('game-frame').src = "";
        }

        function toggleFullscreen() {
            const elem = document.getElementById('game-frame');
            if (!document.fullscreenElement) elem.requestFullscreen().catch(err => alert(err.message));
            else document.exitFullscreen();
        }

        function startFPSCounter() {
            let fps = document.getElementById('fps-val'), last = Date.now(), count = 0;
            function step() {
                let now = Date.now(); count++;
                if (now - last > 1000) { fps.innerText = count; last = now; count = 0; }
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }
    </script>
